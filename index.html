<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Wanderlust — Vacation Planner</title>
    <meta name="description" content="Plan your perfect vacation. Pre-built itineraries for Route 66, Italy, national parks, and more — or describe your dream trip and get a custom day-by-day plan."/>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'><circle cx='20' cy='20' r='20' fill='%23c2591a'/><path d='M8 30 Q14 12 20 22 Q26 32 32 14' stroke='white' stroke-width='3' fill='none' stroke-linecap='round'/><circle cx='32' cy='14' r='3.5' fill='white'/></svg>" />
    <!-- Cabinet Grotesk — Fontshare -->
    <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400,500,700,800&display=swap" rel="stylesheet"/>
    <script>
      (function() {
        var stored = localStorage.getItem("wanderlust-theme");
        var d = stored || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.classList.toggle('dark', d === 'dark');
        document.documentElement.setAttribute('data-theme', d);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
